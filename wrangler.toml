name = "playoffodds"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Snapshot cron: every 10 min, any day. We re-tighten with match-window logic in Phase E.
# The handler's idempotency guard (8 min) keeps duplicate writes out if we ever overlap.
[triggers]
crons = ["*/10 * * * *"]

# D1 binding. Fill in the database_id after running:
#   npx wrangler login
#   npx wrangler d1 create playoffodds
# Wrangler will print the ID and a [[d1_databases]] block — paste the id here.
[[d1_databases]]
binding        = "DB"
database_name  = "playoffodds"
database_id    = "bf3115a0-318c-44af-8918-4db85e09ed53"
migrations_dir = "migrations"

# KV cache (Phase E will use this for the latest-snapshot fast path). For now it's optional —
# the routes read directly from D1. Uncomment after running:
#   npx wrangler kv:namespace create LATEST_SNAPSHOT
# [[kv_namespaces]]
# binding = "LATEST_SNAPSHOT"
# id      = "REPLACE_AFTER_WRANGLER_KV_CREATE"

[observability]
enabled            = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true

# Build-time CSS regeneration so any edit to public/styles.css gets bundled into the Worker.
[build]
command = "npm run build:css"
